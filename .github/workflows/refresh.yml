name: Actualizar Cotizador desde Zoho

on:
  schedule:
    # 12:00 UTC = 9:00 AM Argentina (UTC-3). Ajusta si cambia el huso.
    - cron: '0 12 * * *'
  workflow_dispatch:  # permite correr a mano desde la pestaña Actions

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bajar el .accdb desde Zoho
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
          ZOHO_IMAP_HOST: ${{ secrets.ZOHO_IMAP_HOST }}
          EXPECTED_SENDER: ${{ secrets.EXPECTED_SENDER }}
        run: python fetch_accdb.py

      - name: Regenerar index.html
        env:
          CI: 'true'
          COTIZADOR_PASSWORD: ${{ secrets.COTIZADOR_PASSWORD }}
        run: python actualizar.py Cotizador-Latest.accdb

      - name: Commit y push si index.html cambio
        run: |
          git config user.name "Cotizador Bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html mdb-reader-bundle.js 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "Auto-actualizacion del cotizador ($(date -u +%Y-%m-%d))"
            git push
          fi
